version: "3.9"

services:
  db:
    image: postgres:15-alpine
    container_name: soccersolver_db
    environment:
      POSTGRES_DB: soccersolver
      POSTGRES_USER: soccer
      POSTGRES_PASSWORD: soccer123
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db/migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U soccer -d soccersolver"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build: ./api
    container_name: soccersolver_api
    environment:
      DATABASE_URL: postgresql://soccer:soccer123@db:5432/soccersolver
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./api:/app
      - ./pipeline:/pipeline

  frontend:
    build: ./frontend
    container_name: soccersolver_frontend
    ports:
      - "3000:3000"
    depends_on:
      - api
    environment:
      - VITE_API_URL=http://localhost:8000

volumes:
  pgdata:
